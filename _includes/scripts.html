<!-- Style the trailing venue (bold text ending in a year) of each publication
     as a pill, and append its CCF rank badge. Scoped by the year pattern, so
     non-publication lists are untouched. -->
<script>
  document.addEventListener('DOMContentLoaded', function () {
    var yearRe = /\b(19|20)\d{2}\b/;
    // Venue (acronym or full journal name) -> CCF rank. Absent = unranked (no badge).
    var CCF = {
      'SIGIR':'A','KDD':'A','AAAI':'A','NeurIPS':'A','MM':'A','ICML':'A','WWW':'A','WebConf':'A',
      'IJCAI':'A','ICDE':'A','ACL':'A','CVPR':'A','TOIS':'A',
      'ACM Transactions on Information Systems':'A','IEEE Transactions on Image Processing':'A',
      'CIKM':'B','WSDM':'B','RecSys':'B','DASFAA':'B','SDM':'B','ICDM':'B','IPDPS':'B','ECML-PKDD':'B',
      'Data Mining and Knowledge Discovery':'B','ACM Transactions on Knowledge Discovery from Data':'B',
      'IEEE Transactions on Neural Networks and Learning Systems':'B','Information Sciences':'B',
      'MDM':'C','Neurocomputing':'C','Knowledge-Based Systems':'C','Expert Systems With Applications':'C'
    };
    // Non-CCF-A journals -> CAS (中科院) major-category partition.
    var CAS = {
      'IEEE Transactions on Neural Networks and Learning Systems':'一区',
      'Information Sciences':'一区',
      'Knowledge-Based Systems':'一区',
      'Expert Systems With Applications':'一区',
      'Neurocomputing':'二区',
      'ACM Transactions on Knowledge Discovery from Data':'三区',
      'Data Mining and Knowledge Discovery':'三区',
      'IEEE Access':'四区'
    };
    document.querySelectorAll('.page__content li').forEach(function (li) {
      var strongs = li.querySelectorAll('strong');
      if (!strongs.length) return;
      var last = strongs[strongs.length - 1];
      if (!yearRe.test(last.textContent)) return;
      last.classList.add('venue');
      var key = last.textContent.replace(/\s+(19|20)\d{2}\s*\.?$/, '').trim();
      var ym = last.textContent.match(/(19|20)\d{2}/);
      var year = ym ? parseInt(ym[0], 10) : 0;
      var rank = CCF[key];
      // ICLR has no official CCF rank; tag only the 2026+ paper as A.
      if (key === 'ICLR') rank = (year >= 2026) ? 'A' : undefined;
      var tail = last;
      function addBadge(cls, text) {
        var s = document.createElement('span');
        s.className = cls;
        s.textContent = text;
        tail.parentNode.insertBefore(s, tail.nextSibling);
        tail = s;
      }
      if (rank) addBadge('ccf', 'CCF-' + rank);
      if (CAS[key]) addBadge('cas', '中科院' + CAS[key]);
    });
  });
</script>
